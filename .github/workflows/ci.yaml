# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents/assistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: agents/assistant/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -v
